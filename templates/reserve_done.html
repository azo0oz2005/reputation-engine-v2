{% extends "base.html" %}
{% block title %}تم الطلب · {{ business.name }}{% endblock %}
{% block header %}{% endblock %}

{% block content %}
{% set c = business.color %}
<section class="max-w-md mx-auto px-4 py-6">
  <div class="bg-white rounded-3xl shadow-card border border-slate-100 px-6 py-10 text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full text-white text-4xl mb-6" style="background:{{ c }}">✓</div>
    <h1 class="text-2xl font-extrabold text-ink mb-3">وصلنا طلب حجزك</h1>
    <p class="text-muted leading-loose mb-8">راح يتواصل معك فريق {{ business.name }} لتأكيد الحجز قريبًا.</p>
    <a href="{{ url_for('hub', slug=business.slug) }}"
       class="block w-full text-white font-bold py-4 rounded-2xl text-lg shadow-card" style="background:{{ c }}">
      رجوع للصفحة الرئيسية
    </a>
  </div>
</section>
{% endblock %}
