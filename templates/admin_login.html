{% extends "base.html" %}
{% block title %}دخول الإدارة · سمعة برو{% endblock %}
{% block header_nav %}{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4">
  <div class="bg-white rounded-2xl p-8 shadow-soft border border-slate-100 text-center">

    <span class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-100 text-brand-700 text-2xl mb-3">🔒</span>
    <h1 class="text-xl font-extrabold text-ink">لوحة الإدارة</h1>
    <p class="text-sm text-muted mt-1 mb-6">هذه الصفحة خاصة بمزوّد الخدمة لإضافة الأنشطة.</p>

    <form method="POST" action="{{ url_for('admin_login') }}" class="text-right">
      <label class="block text-sm font-semibold text-ink mb-2">رمز الإدارة</label>
      <input type="password" name="admin_code" autocomplete="off"
             placeholder="••••••••" dir="ltr"
             class="w-full text-center text-lg bg-surface border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 mb-4"
             autofocus required>
      <button type="submit"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl shadow-soft transition">
        دخول
      </button>
    </form>

  </div>
</section>
{% endblock %}
